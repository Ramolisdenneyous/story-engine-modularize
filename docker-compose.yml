services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: story
      POSTGRES_PASSWORD: story
      POSTGRES_DB: story_engine
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://story:story@postgres:5432/story_engine
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_EXTERNAL_ENABLED: ${LLM_EXTERNAL_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL_CHARACTER: ${LLM_MODEL_CHARACTER:-gpt-4o-mini}
      LLM_MODEL_SUMMARY: ${LLM_MODEL_SUMMARY:-gpt-4o-mini}
      LLM_MODEL_NARRATIVE: ${LLM_MODEL_NARRATIVE:-gpt-4o}
      LLM_MODEL_CELEBRATION: ${LLM_MODEL_CELEBRATION:-gpt-5.5}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_BASE_URL: ${ELEVENLABS_BASE_URL:-https://api.elevenlabs.io/v1}
    ports:
      - "8003:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8003
        VITE_TUTORIAL_VIDEO_URL: ${VITE_TUTORIAL_VIDEO_URL:-}
    environment:
      VITE_API_BASE: http://localhost:8003
      VITE_TUTORIAL_VIDEO_URL: ${VITE_TUTORIAL_VIDEO_URL:-}
    ports:
      - "5176:5173"
    depends_on:
      - backend

volumes:
  pg_data:
